<!DOCTYPE html>
<html>
<head>
    <title>Online Attendance Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        :root {
            --bg:           #04071a;
            --bg2:          #060c22;
            --topbar-bg:    #ffffff;
            --card-bg:      #0b1535;
            --card-bg2:     #091028;
            --card-border:  rgba(100,160,255,.14);
            --gold:         #f5b731;
            --gold-dim:     rgba(245,183,49,.18);
            --cyan:         #2ee8ff;
            --cyan-dim:     rgba(46,232,255,.12);
            --text:         #e8f0ff;
            --text-muted:   #5a7aaa;
            --text-sub:     #8daad4;
            --accent:       #3a7bd5;
            --accent-glow:  rgba(58,123,213,.25);
            --filter-bg:    #07102a;
            --filter-border:rgba(58,123,213,.28);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(ellipse at 20% 0%, #0d1a40 0%, #04071a 55%),
                        radial-gradient(ellipse at 80% 100%, #0a1535 0%, #04071a 60%);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', Roboto, Arial, sans-serif;
            min-height: 100vh;
        }

        /* ══════════════════════════════════
           TOP BAR
        ══════════════════════════════════ */
        .topbar {
            background: #fff;
            border-bottom: 3px solid #0078d4;
            padding: 8px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 300;
            box-shadow: 0 4px 20px rgba(0,0,0,.22);
        }

        .topbar-left { display:flex; align-items:center; gap:14px; }

        .topbar-divider { width:1px; height:38px; background:#d1d5db; }

        .topbar-center { display:flex; flex-direction:column; align-items:center; }

        .topbar-title {
            font-size: 18px;
            font-weight: 800;
            color: #0c1a3a;
            letter-spacing: .3px;
        }

        .topbar-subtitle {
            font-size: 11px;
            color: #6b7280;
            font-weight: 500;
            letter-spacing: .5px;
            margin-top: 2px;
        }

        .topbar-right { display:flex; align-items:center; gap:10px; }

        .live-dot {
            width:9px; height:9px;
            background:#22c55e;
            border-radius:50%;
            box-shadow: 0 0 8px #22c55e;
            animation: blink 1.6s ease-in-out infinite;
        }

        @keyframes blink {
            0%,100% { opacity:1; box-shadow:0 0 8px #22c55e; }
            50%      { opacity:.4; box-shadow:0 0 2px #22c55e; }
        }

        .live-label { font-size:12px; font-weight:700; color:#22c55e; letter-spacing:1px; }

        .live-badge {
            background: linear-gradient(135deg,#22c55e,#16a34a);
            color:#fff; border-radius:20px;
            padding:3px 12px; font-size:10px; font-weight:700; letter-spacing:1px;
        }

        /* ══════════════════════════════════
           PAGE BODY
        ══════════════════════════════════ */
        .page-body { padding: 22px 28px; }

        /* ── Section header ── */
        .section-header {
            background: linear-gradient(135deg, rgba(13,26,65,.95) 0%, rgba(8,16,42,.95) 100%);
            border: 1px solid rgba(58,123,213,.35);
            border-radius: 16px;
            padding: 15px 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 32px rgba(0,0,0,.45), 0 0 0 1px rgba(46,232,255,.06),
                        inset 0 1px 0 rgba(255,255,255,.05);
            position: relative;
            overflow: hidden;
        }

        .section-header::before {
            content:'';
            position:absolute; top:-60px; left:-60px;
            width:200px; height:200px;
            background: radial-gradient(circle, rgba(58,123,213,.18) 0%, transparent 70%);
            pointer-events:none;
        }

        .section-title {
            font-size:17px; font-weight:800; color:#e8f0ff;
            display:flex; align-items:center; gap:10px;
        }

        .section-title .title-bar {
            width:4px; height:20px;
            background: linear-gradient(180deg, var(--cyan), var(--accent));
            border-radius:3px;
            box-shadow: 0 0 10px var(--cyan);
        }

        .section-subtitle { font-size:11px; color:var(--text-sub); margin-top:4px; margin-left:14px; }

        .section-badge {
            font-size:11px; color:var(--gold); font-weight:600;
            background:var(--gold-dim); border:1px solid rgba(245,183,49,.3);
            border-radius:20px; padding:4px 14px;
        }

        /* ══════════════════════════════════
           FILTER BAR
        ══════════════════════════════════ */
        .filter-bar {
            background: linear-gradient(135deg, rgba(7,16,42,.97) 0%, rgba(4,9,30,.97) 100%);
            border: 1px solid var(--filter-border);
            border-radius: 14px;
            padding: 14px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 22px;
            align-items: flex-end;
            box-shadow: 0 8px 28px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04),
                        0 0 0 1px rgba(46,232,255,.04);
        }

        .filter-group { display:flex; flex-direction:column; gap:5px; }

        .filter-label {
            font-size:9.5px; font-weight:700;
            text-transform:uppercase; letter-spacing:.9px;
            color: var(--cyan);
        }

        .filter-control {
            background: rgba(4,7,26,.9);
            color: var(--text);
            border: 1px solid var(--filter-border);
            border-radius: 8px;
            padding: 7px 12px;
            font-size: 12.5px;
            min-width: 140px;
            height: 36px;
            transition: border-color .15s, box-shadow .15s;
        }

        .filter-control:focus {
            outline:none;
            border-color: var(--cyan);
            box-shadow: 0 0 0 2px rgba(46,232,255,.15), 0 0 10px rgba(46,232,255,.08);
        }

        .filter-control option { background:#07102a; }

        .filter-dropdown-btn {
            background: rgba(4,7,26,.9);
            color: var(--text);
            border: 1px solid var(--filter-border);
            border-radius: 8px;
            padding: 7px 12px;
            font-size: 12.5px;
            min-width: 140px;
            height: 36px;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            cursor: pointer;
            white-space: nowrap;
            transition: border-color .15s, box-shadow .15s;
        }

        .filter-dropdown-btn:hover,
        .filter-dropdown-btn:focus,
        .filter-dropdown-btn:active,
        .show > .filter-dropdown-btn {
            background: rgba(4,7,26,.9) !important;
            color: var(--text) !important;
            border-color: var(--cyan) !important;
            box-shadow: 0 0 0 2px rgba(46,232,255,.15), 0 0 10px rgba(46,232,255,.08) !important;
        }

        .filter-dropdown-menu {
            background: #0a1535;
            border: 1px solid var(--filter-border);
            border-radius: 10px;
            padding: 8px;
            min-width: 180px;
            max-height: 240px;
            overflow-y: auto;
            box-shadow: 0 16px 40px rgba(0,0,0,.6);
        }

        .filter-dropdown-menu .form-check {
            padding:5px 10px; border-radius:6px; margin-bottom:1px;
        }

        .filter-dropdown-menu .form-check:hover { background:rgba(46,232,255,.06); }
        .filter-dropdown-menu .form-check-label { color:var(--text); font-size:12.5px; }

        .filter-dropdown-menu .form-check-input {
            background-color:#04071a; border-color:var(--filter-border);
        }

        .filter-dropdown-menu .form-check-input:checked {
            background-color:var(--accent); border-color:var(--cyan);
        }

        .filter-dropdown-menu hr { border-color:var(--filter-border); margin:6px 0; }

        .filter-actions { display:flex; align-items:flex-end; }

        .btn-clear {
            background:transparent;
            border:1px solid rgba(245,100,100,.35);
            color:#ff8080;
            border-radius:8px;
            padding:7px 16px;
            font-size:12px; font-weight:600;
            height:36px; cursor:pointer;
            transition:all .15s; letter-spacing:.4px;
        }

        .btn-clear:hover {
            background:rgba(239,68,68,.1);
            border-color:#ff5555; color:#ffaaaa;
            box-shadow:0 0 12px rgba(239,68,68,.2);
        }

        /* ══════════════════════════════════
           CARDS — 3-D layered effect
        ══════════════════════════════════ */
        .dashboard-card {
            background: linear-gradient(160deg, #0e1d4a 0%, #09122e 50%, #060e24 100%);
            border: 1px solid rgba(80,130,255,.18);
            border-radius: 18px;
            height: 100%;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 2px 0 rgba(255,255,255,.04) inset,
                0 -2px 0 rgba(0,0,0,.4) inset,
                4px 0 12px rgba(0,0,0,.35),
                0 8px 32px rgba(0,0,0,.55),
                0 24px 60px rgba(0,0,0,.35),
                0 0 40px rgba(20,60,180,.08);
            transition: transform .22s ease, box-shadow .22s ease;
            transform: perspective(800px) rotateX(0deg) translateZ(0);
        }

        .dashboard-card:hover {
            transform: perspective(800px) rotateX(1.5deg) translateY(-4px) translateZ(6px);
            box-shadow:
                0 2px 0 rgba(255,255,255,.06) inset,
                0 -2px 0 rgba(0,0,0,.5) inset,
                4px 0 12px rgba(0,0,0,.4),
                0 14px 44px rgba(0,0,0,.65),
                0 30px 70px rgba(0,0,0,.4),
                0 0 60px rgba(46,232,255,.08),
                0 0 80px rgba(20,60,180,.12);
        }

        .dashboard-card::before {
            content:'';
            position:absolute; top:0; left:10%; right:10%; height:1px;
            background: linear-gradient(90deg, transparent 0%, rgba(46,232,255,.5) 40%,
                        rgba(100,180,255,.6) 60%, transparent 100%);
            border-radius:50%;
        }

        .dashboard-card::after {
            content:'';
            position:absolute; top:-40px; left:-40px;
            width:160px; height:160px;
            background: radial-gradient(circle, rgba(46,232,255,.05) 0%, transparent 70%);
            pointer-events:none;
        }

        .card-header {
            background: linear-gradient(90deg, rgba(46,232,255,.09) 0%, rgba(58,123,213,.06) 50%, transparent 100%);
            border-bottom: 1px solid rgba(80,130,255,.14);
            color: var(--text);
            font-weight: 700;
            font-size: 13px;
            padding: 13px 18px;
            letter-spacing: .4px;
            border-radius: 18px 18px 0 0;
            display: flex;
            align-items: center;
            gap: 9px;
            position: relative;
        }

        .card-header::before {
            content:'';
            width:3px; height:14px;
            background: linear-gradient(180deg, var(--cyan), var(--accent));
            border-radius:2px;
            box-shadow: 0 0 8px var(--cyan);
            display:inline-block; flex-shrink:0;
        }

        .card-body { padding:16px 18px; }

        /* ══════════════════════════════════
           PIVOT TABLE
        ══════════════════════════════════ */
        .pivot-wrapper { overflow-x:auto; border-radius:8px; }

        .pivot-table { border-collapse:collapse; min-width:100%; font-size:12px; }

        .pivot-table th {
            background: linear-gradient(180deg, #0b1c42 0%, #081428 100%);
            color: var(--gold);
            font-weight:700; font-size:10.5px;
            padding:9px 12px; text-align:center;
            border:1px solid rgba(80,130,255,.12);
            white-space:nowrap; letter-spacing:.4px;
            text-shadow: 0 0 10px rgba(245,183,49,.35);
        }

        .pivot-table th.row-header {
            text-align:left;
            background: linear-gradient(180deg, #07102a 0%, #050d1e 100%);
            color:var(--gold); min-width:130px;
        }

        .pivot-table td {
            padding:7px 12px; text-align:center;
            border:1px solid rgba(80,130,255,.08);
            color:#d0e0ff; white-space:nowrap;
        }

        .pivot-table td.row-label {
            text-align:left; font-weight:500;
            color:#b8d0f5; background:rgba(9,18,46,.8);
        }

        .pivot-table tr:hover td { background:rgba(46,232,255,.06); color:#e8f4ff; }

        .pivot-table tr.total-row td {
            background: linear-gradient(90deg, #0b1c42 0%, #091428 100%);
            color:var(--gold); font-weight:700;
            border-top:2px solid rgba(245,183,49,.3);
            text-shadow: 0 0 8px rgba(245,183,49,.3);
        }

        .pivot-table tr.total-row td.row-label {
            background: linear-gradient(90deg, #0b1c42 0%, #091428 100%);
            color:var(--gold);
        }

        .pivot-table tr:nth-child(even) td { background:rgba(4,9,30,.55); }
        .pivot-table tr:nth-child(even):hover td { background:rgba(46,232,255,.06); }

        /* ══════════════════════════════════
           DATA TABLE
        ══════════════════════════════════ */
        .widget-table {
            font-size:12.5px; color:var(--text);
            --bs-table-bg:transparent; --bs-table-color:var(--text);
        }

        .widget-table th {
            color:var(--cyan); font-weight:700;
            font-size:10.5px; text-transform:uppercase; letter-spacing:.55px;
            border-color:rgba(80,130,255,.12) !important;
            white-space:nowrap; background:rgba(46,232,255,.05);
        }

        .widget-table td { border-color:rgba(80,130,255,.08) !important; color:#c8dcf8; }
        .widget-table tbody tr:hover td { background:rgba(46,232,255,.06); }

        /* ══════════════════════════════════
           KPI
        ══════════════════════════════════ */
        .kpi-value {
            font-size:52px; font-weight:900; text-align:center;
            background: linear-gradient(135deg, var(--gold) 0%, #ffe066 60%, var(--gold) 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            background-clip:text; line-height:1.1;
            filter: drop-shadow(0 0 12px rgba(245,183,49,.4));
        }

        .kpi-label {
            text-align:center; color:var(--text-sub);
            font-size:11px; text-transform:uppercase; letter-spacing:.7px; margin-top:5px;
        }

        /* ══════════════════════════════════
           SCROLLBAR
        ══════════════════════════════════ */
        ::-webkit-scrollbar { width:5px; height:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--cyan), var(--accent));
            border-radius:4px;
        }

        @media (max-width: 768px) {
            .topbar { padding:8px 16px; }
            .topbar-title { font-size:14px; }
            .page-body { padding:14px; }
        }
    </style>
</head>
<body>

<!-- ── Top Logo Bar ── -->
<header class="topbar">
    <div class="topbar-left">
        <img src="/assets/hamara_hr.png" alt="Hamara HR" style="height:44px;width:auto;object-fit:contain;">
        <div class="topbar-divider"></div>
        <img src="/assets/quess-logo.png" alt="Quess" style="height:40px;width:auto;object-fit:contain;">
    </div>
    <div class="topbar-center">
        <div class="topbar-title">Online Attendance Dashboard</div>
        <div class="topbar-subtitle">Real-time Workforce Analytics · Samsung</div>
    </div>
    <div class="topbar-right">
        <div class="live-dot"></div>
        <span class="live-label">LIVE</span>
        <span class="live-badge">NeonDB</span>
    </div>
</header>

<!-- ── Page body ── -->
<div class="page-body">

    <!-- Section header -->
    <div class="section-header">
        <div>
            <div class="section-title">
                <span class="title-bar"></span>
                Attendance Overview
            </div>
            <div class="section-subtitle">Samsung Workforce · All Regions · Real-time data</div>
        </div>
        <div class="section-badge">Powered by Quess Corp</div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">

        <div class="filter-group">
            <div class="filter-label">Region</div>
            <select id="region-filter" class="filter-control">
                <option value="All">All Regions</option>
            </select>
        </div>

        <div class="filter-group">
            <div class="filter-label">Type</div>
            <div class="dropdown">
                <button type="button" id="type-filter-btn" class="filter-dropdown-btn dropdown-toggle"
                    data-bs-toggle="dropdown" data-bs-auto-close="outside">
                    All Types <span style="margin-left:auto;">&#9662;</span>
                </button>
                <ul class="dropdown-menu filter-dropdown-menu" id="type-filter-menu"></ul>
            </div>
        </div>

        <div class="filter-group">
            <div class="filter-label">Channel</div>
            <div class="dropdown">
                <button type="button" id="channel-filter-btn" class="filter-dropdown-btn dropdown-toggle"
                    data-bs-toggle="dropdown" data-bs-auto-close="outside">
                    All Channels <span style="margin-left:auto;">&#9662;</span>
                </button>
                <ul class="dropdown-menu filter-dropdown-menu" id="channel-filter-menu"></ul>
            </div>
        </div>

        <div class="filter-group">
            <div class="filter-label">ASE</div>
            <select id="ase-filter" class="filter-control">
                <option value="All">All ASEs</option>
            </select>
        </div>

        <div class="filter-group">
            <div class="filter-label">ZSE</div>
            <select id="zse-filter" class="filter-control">
                <option value="All">All ZSEs</option>
            </select>
        </div>

        <div class="filter-group">
            <div class="filter-label">Attendance Type</div>
            <div class="dropdown">
                <button type="button" id="atype-filter-btn" class="filter-dropdown-btn dropdown-toggle"
                    data-bs-toggle="dropdown" data-bs-auto-close="outside">
                    All Types <span style="margin-left:auto;">&#9662;</span>
                </button>
                <ul class="dropdown-menu filter-dropdown-menu" id="atype-filter-menu"></ul>
            </div>
        </div>

        <div class="filter-group">
            <div class="filter-label">Date From</div>
            <input type="date" id="date-from" class="filter-control" style="min-width:150px;">
        </div>

        <div class="filter-group">
            <div class="filter-label">Date To</div>
            <input type="date" id="date-to" class="filter-control" style="min-width:150px;">
        </div>

        <div class="filter-group">
            <div class="filter-label">User ID</div>
            <input type="text" id="user-id-filter" class="filter-control"
                   placeholder="Search user ID…" style="min-width:150px;">
        </div>

        <div class="filter-actions">
            <button class="btn-clear" onclick="clearAllFilters()">&#10005; Clear All</button>
        </div>

    </div>

    <!-- Dashboard widgets -->
    <div class="row g-4" id="dashboard-container"></div>

</div>

<script src="/static/dashboard.js"></script>
</body>
</html>
