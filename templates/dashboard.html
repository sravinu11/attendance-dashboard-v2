<!DOCTYPE html>
<html>
<head>
    <title>Attendance Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #f4f6fb;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #2c3e50;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-width: 180px;
            flex: 1;
        }

        .filter-group label {
            font-size: 0.9rem;
            color: #55688a;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 0.75rem 0.85rem;
            border: 1px solid #d8e1ee;
            border-radius: 14px;
            font-size: 1rem;
            background: #ffffff;
        }

        .card {
            border-radius: 24px;
            background: #ffffff;
            box-shadow: 0 18px 40px rgba(20, 40, 80, 0.08);
            border: 1px solid #e8edf6;
            overflow: hidden;
        }

        .card-header {
            padding: 1rem 1.5rem;
            background: #f8faff;
            border-bottom: 1px solid #e8edf6;
            font-weight: 700;
            cursor: move;
        }

        .card-body {
            padding: 1rem;
        }

        #chartCard {
            resize: both;
            overflow: hidden;
            min-width: 320px;
            min-height: 420px;
            width: 100%;
            max-width: 100%;
            height: 520px;
        }

        #genderPie {
            width: 100% !important;
            height: 100% !important;
        }

        @media (max-width: 768px) {
            .filters {
                flex-direction: column;
            }
            #chartCard {
                height: 460px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Attendance Dashboard</h1>

    <div class="filters">
        <div class="filter-group">
            <label for="dateFilter">Select Date</label>
            <input type="date" id="dateFilter">
        </div>
    </div>

    <div id="chartCard" class="card">
        <div class="card-header">Gender Distribution</div>
        <div class="card-body">
            <canvas id="genderPie"></canvas>
        </div>
    </div>

    <div id="summaryCard" class="card" style="margin-top: 1.5rem;">
        <div class="card-header">Attendance Summary</div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-striped mb-0" id="summaryTable">
                    <thead>
                        <tr id="summaryHeaderRow"></tr>
                    </thead>
                    <tbody id="summaryBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="/static/dashboard.js"></script>

</body>
</html>
